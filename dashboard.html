<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spendora Student - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <script src="js/common.js" defer></script>
  <script src="js/dashboard.js" defer></script>
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar">
      <a href="index.html" class="brand side-brand">
        <span class="brand-logo">S</span>
        <span>Spendora Student</span>
      </a>
      <nav class="side-nav">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="transactions.html">Transactions</a>
        <a href="budgets.html">Budgets</a>
        <a href="goals.html">Goals</a>
        <a href="analytics.html">Analytics</a>
      </nav>
    </aside>

    <main class="page-main">
      <header class="page-topbar">
        <div>
          <p class="eyebrow">Overview</p>
          <h1>Dashboard</h1>
        </div>
        <button id="themeToggle" class="theme-btn">🌙 Theme</button>
      </header>

      <section class="summary-grid">
        <div class="summary-card">
          <p>Total Income</p>
          <h2 id="totalIncome">₹0</h2>
        </div>
        <div class="summary-card">
          <p>Total Expenses</p>
          <h2 id="totalExpense">₹0</h2>
        </div>
        <div class="summary-card">
          <p>Balance</p>
          <h2 id="balance">₹0</h2>
        </div>
        <div class="summary-card">
          <p>Savings Rate</p>
          <h2 id="savingsRate">0%</h2>
        </div>
      </section>

      <section class="chart-grid">
        <article class="panel">
          <h3>Income vs Expense</h3>
          <canvas id="trendChart"></canvas>
        </article>
        <article class="panel">
          <h3>Expense Split</h3>
          <canvas id="categoryChart"></canvas>
        </article>
      </section>

      <section class="panel">
        <h3>Quick Navigation</h3>
        <div class="quick-links">
          <a href="transactions.html" class="btn btn-primary">Go to Transactions</a>
          <a href="budgets.html" class="btn btn-secondary">Go to Budgets</a>
          <a href="goals.html" class="btn btn-secondary">Go to Goals</a>
          <a href="analytics.html" class="btn btn-secondary">Go to Analytics</a>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
